services:
  - type: web
    name: release-dock
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    disk:
      name: release-dock-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DB_PATH
        value: /data/store.db
      - key: UPLOAD_ROOT
        value: /data/uploads
